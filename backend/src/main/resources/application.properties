# Default configuration that will be overridden by environment variables
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/navident_clinic}
server.port=${PORT:8080}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:e9efee1a225a94cccfeb837686aa7096}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Admin User Configuration
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.email=${ADMIN_EMAIL:admin@navident.com}

# CORS Configuration - THESE ARE THE MISSING PROPERTIES!
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.exposed-headers=${CORS_EXPOSED_HEADERS:Authorization,Content-Type}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

# Spring Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Logging
logging.level.com.navident.clinic=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${WEB_LOG_LEVEL:INFO}
logging.level.root=${ROOT_LOG_LEVEL:INFO}
