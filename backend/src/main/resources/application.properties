# Server Configuration
server.port=10000

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/navident_clinic}
spring.data.mongodb.database=navident_clinic

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySecretKey1234567890abcdefghijklmnopqrstuvwxyz}
app.jwt.expiration-ms=86400000

# Logging Configuration
logging.level.com.navident.clinic=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Management endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
