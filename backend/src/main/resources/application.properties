# Development configuration
spring.data.mongodb.uri=mongodb://localhost:27017/navident_clinic
spring.data.mongodb.database=navident_clinic

# Server Configuration
server.port=8080

# JWT Configuration
app.jwt.secret=navidentSecretKeyForJWTTokenGenerationAndValidation2024
app.jwt.expiration=86400000

# Admin User Configuration
app.admin.username=admin
app.admin.password=admin123
app.admin.email=admin@navident.com

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*

# Logging
logging.level.com.navident.clinic=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%level] %logger{36} - %msg%n
logging.file.name=${LOG_FILE:logs/navident-clinic.log}
logging.file.max-size=10MB
logging.file.max-history=30
logging.logback.rollingpolicy.total-size-cap=500MB

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true