# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=
server.error.include-message=always
server.error.include-binding-errors=always

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/navident_clinic}
spring.data.mongodb.database=${MONGODB_DATABASE:navident_clinic}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:navidentSecretKeyForJWTTokenGenerationAndValidation2024ProductionDeployment}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Admin User Configuration
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.email=${ADMIN_EMAIL:admin@navident.com}

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://*.onrender.com}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.exposed-headers=*
app.cors.allow-credentials=true

# Logging Configuration
logging.level.com.navident.clinic=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.mongodb.driver=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Production Settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
